<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thông tin liên hệ - Hệ thống quản lý sinh viên</title>
    <!-- Import Google Font Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      :root {
        --primary: #3b82f6;
        --primary-dark: #1d4ed8;
        --primary-gradient: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
        --success: #10b981;
        --error: #ef4444;
        --bg: #f8fafc;
        --text-main: #0f172a;
        --text-muted: #475569;
        --border: rgba(226, 232, 240, 0.8);
        --shadow: 0 20px 25px -5px rgba(15, 23, 42, 0.05), 0 8px 10px -6px rgba(15, 23, 42, 0.05);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: var(--bg);
        background-image: 
          radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.06) 0px, transparent 50%),
          radial-gradient(at 100% 0%, rgba(99, 102, 241, 0.06) 0px, transparent 50%),
          radial-gradient(at 50% 100%, rgba(244, 63, 94, 0.03) 0px, transparent 50%);
        color: var(--text-main);
        line-height: 1.6;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 40px 20px;
      }

      .container {
        width: 100%;
        max-width: 800px;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 40px;
        box-shadow: var(--shadow);
        position: relative;
        overflow: hidden;
      }

      /* Top accent line */
      .container::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 6px;
        background: var(--primary-gradient);
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 20px;
        margin-bottom: 32px;
        padding-bottom: 24px;
        border-bottom: 1px solid #f1f5f9;
      }

      .title-group {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .title-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 52px;
        height: 52px;
        border-radius: 16px;
        background: rgba(59, 130, 246, 0.1);
        color: var(--primary);
        flex-shrink: 0;
      }

      .title-icon i {
        width: 26px;
        height: 26px;
      }

      h1 {
        font-size: 26px;
        font-weight: 800;
        letter-spacing: -0.02em;
        color: #0f172a;
      }

      .btn-back {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
        background: var(--primary-gradient);
        color: white;
        padding: 12px 20px;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 700;
        box-shadow: 0 4px 12px rgba(59, 130, 246, 0.15);
        transition: all 0.2s ease;
      }

      .btn-back:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(59, 130, 246, 0.25);
      }

      .btn-back:active {
        transform: translateY(0);
      }

      .intro-text {
        font-size: 15px;
        color: var(--text-muted);
        font-weight: 500;
        margin-bottom: 28px;
        padding: 16px;
        background: rgba(59, 130, 246, 0.03);
        border-left: 4px solid var(--primary);
        border-radius: 4px 12px 12px 4px;
      }

      .intro-text strong {
        color: var(--primary-dark);
      }

      h2 {
        font-size: 18px;
        font-weight: 700;
        margin-top: 8px;
        margin-bottom: 20px;
        color: #1e293b;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      h2 i {
        color: var(--primary);
        width: 20px;
        height: 20px;
      }

      /* Form styling */
      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
      }

      .grid-col-full {
        grid-column: span 2;
      }

      .input-group {
        display: flex;
        flex-direction: column;
      }

      .input-group label {
        font-size: 13px;
        font-weight: 700;
        color: #1e293b;
        margin-bottom: 8px;
      }

      .input-wrapper {
        position: relative;
        display: flex;
        align-items: center;
      }

      .input-wrapper i {
        position: absolute;
        left: 16px;
        color: #94a3b8;
        width: 18px;
        height: 18px;
        pointer-events: none;
      }

      .input-wrapper input, .input-wrapper textarea {
        width: 100%;
        padding: 12px 16px 12px 46px;
        font-family: inherit;
        font-size: 14px;
        color: var(--text-main);
        background: rgba(248, 250, 252, 0.8);
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        outline: none;
        transition: all 0.2s ease;
      }

      .input-wrapper textarea {
        min-height: 120px;
        resize: vertical;
        padding-top: 12px;
      }

      .input-wrapper.textarea-wrapper i {
        top: 14px;
      }

      .input-wrapper input:focus, .input-wrapper textarea:focus {
        background: #fff;
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
      }

      .btn-submit {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: var(--primary-gradient);
        color: white;
        border: none;
        outline: none;
        cursor: pointer;
        padding: 14px 28px;
        border-radius: 12px;
        font-size: 15px;
        font-weight: 700;
        box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
        transition: all 0.2s ease;
        width: 100%;
        margin-top: 8px;
      }

      .btn-submit:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(59, 130, 246, 0.3);
      }

      .btn-submit:active:not(:disabled) {
        transform: translateY(0);
      }

      .btn-submit:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }

      /* Alert message styles */
      .msg {
        display: none;
        align-items: flex-start;
        gap: 12px;
        padding: 16px;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 600;
        margin-top: 20px;
      }

      .msg.ok {
        display: flex;
        background: rgba(16, 185, 129, 0.08);
        border: 1px solid rgba(16, 185, 129, 0.2);
        color: #065f46;
      }

      .msg.err {
        display: flex;
        background: rgba(239, 68, 68, 0.08);
        border: 1px solid rgba(239, 68, 68, 0.2);
        color: #991b1b;
      }

      .links-footer {
        margin-top: 40px;
        padding-top: 28px;
        border-top: 1px solid #f1f5f9;
        display: flex;
        justify-content: center;
        gap: 16px;
        flex-wrap: wrap;
      }

      .link-item {
        color: var(--text-muted);
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
        padding: 10px 18px;
        border-radius: 12px;
        background: transparent;
        transition: all 0.2s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 1px solid transparent;
      }

      .link-item i {
        width: 16px;
        height: 16px;
      }

      .link-item:hover {
        color: var(--primary);
        background: rgba(59, 130, 246, 0.05);
        border-color: rgba(59, 130, 246, 0.1);
      }

      .link-item.active {
        color: var(--primary);
        background: rgba(59, 130, 246, 0.08);
        border-color: rgba(59, 130, 246, 0.15);
        font-weight: 700;
      }

      @media (max-width: 640px) {
        body {
          padding: 16px 12px;
        }
        .container {
          padding: 24px;
          border-radius: 20px;
        }
        .header {
          flex-direction: column;
          align-items: flex-start;
          gap: 16px;
          margin-bottom: 24px;
          padding-bottom: 20px;
        }
        .btn-back {
          width: 100%;
          justify-content: center;
        }
        .form-grid {
          grid-template-columns: 1fr;
          gap: 16px;
        }
        .grid-col-full {
          grid-column: span 1;
        }
        .links-footer {
          flex-direction: column;
          gap: 8px;
        }
        .link-item {
          width: 100%;
          justify-content: center;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <div class="header">
        <div class="title-group">
          <div class="title-icon">
            <i data-lucide="mail"></i>
          </div>
          <h1>Thông tin liên hệ</h1>
        </div>
        <a class="btn-back" href="/login">
          <i data-lucide="arrow-left"></i>
          Về trang đăng nhập
        </a>
      </div>

      <p class="intro-text">
        Nếu bạn cần hỗ trợ về đăng nhập, điểm danh, rèn luyện hoặc tài khoản, vui lòng gửi biểu mẫu.
        Yêu cầu sẽ hiển thị tại menu <strong>Hỗ trợ</strong> của tài khoản quản trị.
      </p>

      <h2>
        <i data-lucide="contact-2"></i>
        Gửi biểu mẫu hỗ trợ
      </h2>

      <form id="support-form">
        <div class="form-grid">
          <div class="input-group">
            <label for="fullName">Họ và tên *</label>
            <div class="input-wrapper">
              <i data-lucide="user"></i>
              <input id="fullName" name="fullName" type="text" placeholder="Nguyễn Văn A" required />
            </div>
          </div>
          
          <div class="input-group">
            <label for="email">Email</label>
            <div class="input-wrapper">
              <i data-lucide="mail"></i>
              <input id="email" name="email" type="email" placeholder="example@gmail.com" />
            </div>
          </div>

          <div class="input-group">
            <label for="phone">Số điện thoại</label>
            <div class="input-wrapper">
              <i data-lucide="phone"></i>
              <input id="phone" name="phone" type="text" placeholder="0123456789" />
            </div>
          </div>

          <div class="input-group">
            <label for="subject">Tiêu đề *</label>
            <div class="input-wrapper">
              <i data-lucide="help-circle"></i>
              <input id="subject" name="subject" type="text" placeholder="Cần hỗ trợ về..." required />
            </div>
          </div>

          <div class="input-group grid-col-full">
            <label for="message">Nội dung *</label>
            <div class="input-wrapper textarea-wrapper">
              <i data-lucide="message-square"></i>
              <textarea id="message" name="message" placeholder="Nhập chi tiết nội dung bạn cần hỗ trợ ở đây..." required></textarea>
            </div>
          </div>
        </div>

        <button id="submit-btn" class="btn-submit" type="submit">
          <i data-lucide="send"></i>
          <span>Gửi hỗ trợ</span>
        </button>

        <div id="form-message" class="msg"></div>
      </form>

      <div class="links-footer">
        <a href="/chinhsachbaomat.html" class="link-item">
          <i data-lucide="shield-check"></i>
          Chính sách bảo mật
        </a>
        <a href="/dieukhoansudung.html" class="link-item">
          <i data-lucide="file-text"></i>
          Điều khoản sử dụng
        </a>
        <a href="/thongtinlienhe.html" class="link-item active">
          <i data-lucide="mail"></i>
          Thông tin liên hệ
        </a>
      </div>
    </main>

    <script>
      // Initialize Lucide icons
      lucide.createIcons();

      const API_BASE =
        window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
          ? 'http://localhost:5000/api'
          : '/api';

      const form = document.getElementById('support-form');
      const submitBtn = document.getElementById('submit-btn');
      const messageEl = document.getElementById('form-message');

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        messageEl.style.display = 'none';
        messageEl.innerHTML = '';
        messageEl.className = 'msg';
        submitBtn.disabled = true;
        submitBtn.querySelector('span').textContent = 'Đang gửi...';
        submitBtn.querySelector('i').setAttribute('data-lucide', 'loader-2');
        submitBtn.querySelector('i').classList.add('animate-spin');
        lucide.createIcons();

        const payload = {
          fullName: form.fullName.value.trim(),
          email: form.email.value.trim(),
          phone: form.phone.value.trim(),
          subject: form.subject.value.trim(),
          message: form.message.value.trim(),
          sourcePage: '/thongtinlienhe.html',
        };

        try {
          const res = await fetch(`${API_BASE}/support/public`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });

          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            throw new Error(data.message || 'Không thể gửi yêu cầu hỗ trợ');
          }

          form.reset();
          messageEl.innerHTML = `<i data-lucide="check-circle" style="color: var(--success); flex-shrink: 0;"></i> <span>Đã gửi biểu mẫu thành công. Quản trị viên sẽ phản hồi sớm.</span>`;
          messageEl.className = 'msg ok';
          lucide.createIcons();
        } catch (error) {
          messageEl.innerHTML = `<i data-lucide="alert-triangle" style="color: var(--error); flex-shrink: 0;"></i> <span>${error.message || 'Có lỗi xảy ra khi gửi biểu mẫu.'}</span>`;
          messageEl.className = 'msg err';
          lucide.createIcons();
        } finally {
          submitBtn.disabled = false;
          submitBtn.querySelector('span').textContent = 'Gửi hỗ trợ';
          submitBtn.querySelector('i').setAttribute('data-lucide', 'send');
          submitBtn.querySelector('i').classList.remove('animate-spin');
          lucide.createIcons();
        }
      });
    </script>
  </body>
</html>
